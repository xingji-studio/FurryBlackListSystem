{% extends "base.html" %}
{% block title %}查询 - 福瑞联合净网行动{% endblock %}
{% block content %}
<main class="single-panel">
  <div class="panel-header">
    <a class="text-link" href="{{ url_for('index') }}">返回首页</a>
    <span class="eyebrow">Archive Lookup</span>
    <h1>黑名单查询</h1>
    <p>输入平台和账号名，页面会调用公开 API 检索已通过审核的记录。你也可以在外部程序中直接请求同一个接口。</p>
  </div>

  <form class="form-panel compact" id="search-form" data-api-endpoint="{{ url_for('api_search') }}" novalidate>
    <label>平台
      <select name="platform" required>
        <option value="">请选择平台</option>
        {% for platform in allowed_platforms %}
          <option value="{{ platform }}">{{ platform }}</option>
        {% endfor %}
      </select>
    </label>
    <label>账号名 / 账号 ID
      <input name="account_id" type="text" placeholder="例如：user_12345" required>
    </label>
    <button class="primary-button" type="submit">开始查询</button>
  </form>

  <section class="result-panel api-result-panel" id="search-feedback" hidden></section>
</main>
<script src="{{ url_for('static', filename='search-api.js') }}"></script>
{% endblock %}
