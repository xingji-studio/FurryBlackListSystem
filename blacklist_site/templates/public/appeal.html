{% extends "base.html" %}
{% block title %}申诉 - 福瑞联合净网行动{% endblock %}
{% block content %}
<main class="single-panel">
  <div class="panel-header">
    <a class="text-link" href="{{ url_for('index') }}">返回首页</a>
    <span class="eyebrow">Appeal Review</span>
    <h1>申诉提交</h1>
    <p>若收录存在误判，可提交申诉和补充说明。管理员审核通过后，会自动移除对应黑名单记录。</p>
  </div>
  <form class="form-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>平台
      <select name="platform" required>
        <option value="">请选择平台</option>
        {% for platform in allowed_platforms %}
          <option value="{{ platform }}">{{ platform }}</option>
        {% endfor %}
      </select>
    </label>
    <label>账号 ID
      <input name="account_id" type="text" placeholder="例如：user_12345" required>
    </label>
    <label>描述
      <textarea name="description" rows="5" placeholder="说明为什么是误收录，并补充必要上下文" required></textarea>
    </label>
    <label>证据
      <textarea name="evidence" rows="5" placeholder="填写截图链接、录屏链接或其他证据说明" required></textarea>
    </label>
    <button class="primary-button" type="submit">提交申诉</button>
  </form>
</main>
{% endblock %}
