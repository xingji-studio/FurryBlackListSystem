{% extends "base.html" %}
{% block title %}举报 - 福瑞联合净网行动{% endblock %}
{% block content %}
<main class="single-panel">
  <div class="panel-header">
    <a class="text-link" href="{{ url_for('index') }}">返回首页</a>
    <span class="eyebrow">Case Intake</span>
    <h1>举报提交</h1>
    <p>请围绕极端反福瑞行为填写事实经过。审核通过后，平台、账号 ID、威胁程度与描述会被正式记录。</p>
  </div>
  <form class="form-panel" method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>平台
      <select name="platform" required>
        <option value="">请选择平台</option>
        {% for platform in allowed_platforms %}
          <option value="{{ platform }}">{{ platform }}</option>
        {% endfor %}
      </select>
    </label>
    <label>账号 ID（如QQ号、UID等，注意不是用户名）
      <input name="account_id" type="text" placeholder="例如：user_12345" required>
    </label>
    <label>威胁程度
      <select name="threat_level" required>
        <option value="">请选择</option>
        <option value="低">低 - 轻微言论攻击</option>
        <option value="中">中 - 较严重言论攻击</option>
        <option value="高">高 - 反复骚扰，或对群聊构成威胁</option>
        <option value="严重">严重 - 实施过炸群、网暴、开盒等极端行为</option>
      </select>
    </label>
    <label>描述
      <textarea name="description" rows="5" placeholder="简述行为经过、时间线、风险点与针对性内容" required></textarea>
    </label>
    <label>证据
      <textarea name="evidence" rows="5" placeholder="填写截图链接、聊天记录、动态链接或其他证据说明" required></textarea>
    </label>
    <label>补充图片证据
      <input name="images" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
      <span class="field-hint">可上传最多 4 张图片，支持 JPG、PNG、WEBP、GIF，单张不超过 5MB。</span>
    </label>
    <button class="primary-button" type="submit">提交举报</button>
  </form>
</main>
{% endblock %}
