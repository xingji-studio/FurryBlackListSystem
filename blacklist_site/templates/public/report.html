{% extends "base.html" %}
{% block title %}举报 - 黑名单系统{% endblock %}
{% block content %}
<main class="single-panel">
  <div class="panel-header">
    <a class="text-link" href="{{ url_for('index') }}">返回首页</a>
    <h1>举报提交</h1>
    <p>管理员审核通过后，平台、账号 ID、威胁程度和描述会自动进入黑名单。</p>
  </div>
  <form class="form-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>平台
      <select name="platform" required>
        <option value="">请选择平台</option>
        {% for platform in allowed_platforms %}
          <option value="{{ platform }}">{{ platform }}</option>
        {% endfor %}
      </select>
    </label>
    <label>账号 ID
      <input name="account_id" type="text" placeholder="例如：user_12345" required>
    </label>
    <label>威胁程度
      <select name="threat_level" required>
        <option value="">请选择</option>
        <option value="低">低</option>
        <option value="中">中</option>
        <option value="高">高</option>
        <option value="严重">严重</option>
      </select>
    </label>
    <label>描述
      <textarea name="description" rows="5" placeholder="简述行为、时间线、风险点" required></textarea>
    </label>
    <label>证据
      <textarea name="evidence" rows="5" placeholder="填写截图链接、聊天记录链接或其他证据说明" required></textarea>
    </label>
    <button class="primary-button" type="submit">提交举报</button>
  </form>
</main>
{% endblock %}
