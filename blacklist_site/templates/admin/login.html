{% extends "base.html" %}
{% block title %}后台登录 - 黑名单系统{% endblock %}
{% block content %}
<main class="login-layout">
  <section class="login-panel dossier">
    <span class="eyebrow">后台审核端</span>
    <h1>管理员登录</h1>
    <p>登录后可以审核举报、审核申诉，并维护针对极端反福瑞行为的在案记录。</p>
    <p class="field-hint">当前设备登录成功后，10 分钟内无需再次输入账号和密码。</p>
    <form class="form-panel compact" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>账号
        <input name="username" type="text" required>
      </label>
      <label>密码
        <input name="password" type="password" required>
      </label>
      <button class="primary-button" type="submit">登录后台</button>
    </form>
  </section>
</main>
{% endblock %}
