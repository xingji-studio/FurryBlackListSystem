limit_req_zone $binary_remote_addr zone=public_api_per_ip:20m rate=8r/s;
limit_req_zone $binary_remote_addr zone=public_page_per_ip:20m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

upstream furryblacklist_public {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream furryblacklist_admin {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80;
    server_name public.example.com;

    client_max_body_size 6m;
    keepalive_timeout 15;
    send_timeout 15;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /static/ {
        proxy_pass http://furryblacklist_public;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
    }

    location /api/blacklist/search {
        limit_req zone=public_api_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://furryblacklist_public;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location /blacklist-images/ {
        limit_req zone=public_page_per_ip burst=30 nodelay;
        limit_conn conn_per_ip 15;
        proxy_pass http://furryblacklist_public;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location / {
        limit_req zone=public_page_per_ip burst=15 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://furryblacklist_public;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }
}

server {
    listen 80;
    server_name admin.example.com;

    client_max_body_size 6m;
    keepalive_timeout 15;
    send_timeout 15;

    location / {
        limit_req zone=public_page_per_ip burst=10 nodelay;
        limit_conn conn_per_ip 8;
        proxy_pass http://furryblacklist_admin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }
}
